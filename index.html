<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura Matemática - ¡Nos hemos mudado!</title>
    <meta http-equiv="refresh" content="8;url=https://aventura-matematica-feb8c.web.app/">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #87CEEB; /* El azul cielo original */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #2d3436;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 20px;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #0984e3;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #636e72;
        }

        .btn-new-site {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 30px;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-new-site:hover {
            transform: scale(1.05);
            background: #27ae60;
        }

        .timer {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🚀</div>
        <h1>¡La aventura continúa!</h1>
        <p>Hemos mejorado nuestra página para que sigas aprendiendo matemáticas de la forma más divertida.</p>
        <p>Esta dirección ya no existe, pero te estamos llevando a nuestra nueva casa...</p>
        
        <a href="https://aventura-matematica-feb8c.web.app/" class="btn-new-site">IR A LA NUEVA AVENTURA ➕</a>
        
        <p class="timer">Serás redirigido automáticamente en unos segundos.</p>
    </div>

</body>
</html>
